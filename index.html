<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de CNPJS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Consultar CNPJs</h1>
    
    <label for="cnpj">Digite o CNPJ: </label>
    <input type="text" id="cnpj" maxlength="18" placeholder="Ex: 12.345.678/0001-95" oninput="formatarCNPJ()">
    
    <button onclick="consultarCNPJ()">Consultar</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
